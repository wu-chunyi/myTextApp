name: Build App

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'android'
        type: choice
        options:
          - android
          - ios
          - all
  push:
    branches:
      - main

jobs:
  build-android:
    name: Build Android APK
    if: ${{ github.event_name == 'push' || inputs.platform == 'android' || inputs.platform == 'all' }}
    runs-on: ubuntu-latest
    steps:
      - name: 📦 Checkout code
        uses: actions/checkout@v4

      - name: 🏗 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 🏗 Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔨 Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ⚡ 缓存 Gradle 依赖（核心优化，可节省 3-5 分钟）
      - name: ⚡ Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # ⚡ 缓存 EAS 本地构建产物
      - name: ⚡ Cache EAS build
        uses: actions/cache@v4
        with:
          path: ~/.expo
          key: expo-${{ hashFiles('app.json', 'eas.json', 'package-lock.json') }}
          restore-keys: expo-

      - name: 👷 Build Android APK
        run: eas build --local --platform android --profile preview --non-interactive --output ./app-release.apk

      - name: 📱 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: ./app-release.apk
          retention-days: 14

  build-ios:
    name: Build iOS
    if: ${{ inputs.platform == 'ios' || inputs.platform == 'all' }}
    runs-on: macos-latest
    steps:
      - name: 📦 Checkout code
        uses: actions/checkout@v4

      - name: 🏗 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 🏗 Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📦 Install dependencies
        run: npm ci

      # ⚡ 缓存 CocoaPods
      - name: ⚡ Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: pods-${{ hashFiles('**/Podfile.lock') }}
          restore-keys: pods-

      - name: 👷 Build iOS
        run: eas build --local --platform ios --profile preview --non-interactive --output ./app-release.ipa

      - name: 📱 Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: ./app-release.ipa
          retention-days: 14

