name: Build App

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'android'
        type: choice
        options:
          - android
          - ios
          - all
  push:
    branches:
      - main

jobs:
  build-android:
    name: Build Android APK
    if: ${{ github.event_name == 'push' || inputs.platform == 'android' || inputs.platform == 'all' }}
    runs-on: ubuntu-latest
    steps:
      - name: 📦 Checkout code
        uses: actions/checkout@v4

      - name: 🏗 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 🏗 Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📦 Install dependencies
        run: npm ci

      - name: 👷 Build Android APK On EAS Cloud
        id: android_build
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          set -euo pipefail
          eas build --platform android --profile production-apk --non-interactive --wait --json > eas-android-build.json
          python3 - <<'PY'
          import json

          with open('eas-android-build.json', 'r', encoding='utf-8') as f:
              data = json.load(f)

          build = data[0] if isinstance(data, list) else data
          build_id = build["id"]
          build_url = f"https://expo.dev/accounts/wu-expo/projects/my-test-app/builds/{build_id}"
          artifacts = build.get("artifacts") or {}
          artifact_url = artifacts.get("applicationArchiveUrl") or artifacts.get("buildUrl")

          if not artifact_url:
              raise SystemExit("EAS build finished but no APK artifact URL was returned.")

          with open('build_outputs.txt', 'w', encoding='utf-8') as f:
              f.write(f"build_id={build_id}\n")
              f.write(f"build_url={build_url}\n")
              f.write(f"artifact_url={artifact_url}\n")

          print(f"Triggered Android build: {build_id}")
          print(f"Build URL: {build_url}")
          print(f"Artifact URL: {artifact_url}")
          PY
          cat build_outputs.txt >> "$GITHUB_OUTPUT"
          artifact_url="$(grep '^artifact_url=' build_outputs.txt | cut -d= -f2-)"
          curl -L "$artifact_url" -o app-release.apk

      - name: 📝 Build Summary
        run: |
          {
            echo "## Android APK build completed"
            echo ""
            echo "- Profile: \`production-apk\`"
            echo "- Build ID: \`${{ steps.android_build.outputs.build_id }}\`"
            echo "- Build URL: ${{ steps.android_build.outputs.build_url }}"
            echo "- APK URL: ${{ steps.android_build.outputs.artifact_url }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: 📱 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: app-release.apk
          if-no-files-found: error
          retention-days: 14

      - name: 📱 Upload build metadata
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: android-eas-build
          path: |
            eas-android-build.json
            build_outputs.txt
          if-no-files-found: warn
          retention-days: 14

  build-ios:
    name: Build iOS
    if: ${{ inputs.platform == 'ios' || inputs.platform == 'all' }}
    runs-on: macos-latest
    steps:
      - name: 📦 Checkout code
        uses: actions/checkout@v4

      - name: 🏗 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 🏗 Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📦 Install dependencies
        run: npm ci

      # ⚡ 缓存 CocoaPods
      - name: ⚡ Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: pods-${{ hashFiles('**/Podfile.lock') }}
          restore-keys: pods-

      - name: 👷 Trigger iOS Build On EAS Cloud
        run: eas build --platform ios --profile production --non-interactive --no-wait
